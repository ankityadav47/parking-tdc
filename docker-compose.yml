version: "3.9"

services:
  # ─── PostgreSQL with PostGIS ──────────────────────────────────────────────
  postgres:
    image: postgis/postgis:15-3.4
    container_name: parkspot-postgres
    environment:
      POSTGRES_USER: parkspot
      POSTGRES_PASSWORD: parkspot
      POSTGRES_DB: parkspot
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parkspot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: parkspot-redis
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO (S3-compatible object storage) ────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: parkspot-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console UI
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ─── MailHog (email catcher for dev) ─────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: parkspot-mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI

volumes:
  pgdata:
  redisdata:
  miniodata:
